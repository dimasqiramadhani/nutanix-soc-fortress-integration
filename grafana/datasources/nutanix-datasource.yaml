apiVersion: 1

# ---------------------------------------------------------------------------
# Nutanix SOC Sandbox : Provisioning Datasource Grafana
# ---------------------------------------------------------------------------
# Datasource ini menunjuk ke OpenSearch sandbox (satu node) yang menyimpan
# index nutanix_network_*. Kredensial di bawah hanya untuk sandbox lokal.
# ---------------------------------------------------------------------------

datasources:
  - name: NUTANIX
    uid: NUTANIX
    type: grafana-opensearch-datasource
    access: proxy
    url: https://opensearch:9200
    basicAuth: true
    basicAuthUser: admin
    jsonData:
      flavor: opensearch
      version: 2.19.4
      timeField: timestamp
      database: "nutanix_network_*"
      pplEnabled: true
      tlsSkipVerify: true
      maxConcurrentShardRequests: 5
    secureJsonData:
      basicAuthPassword: "SandboxAdmin123!"   # hanya untuk sandbox, ganti pada produksi
    editable: true
