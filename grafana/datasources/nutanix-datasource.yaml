apiVersion: 1

# ---------------------------------------------------------------------------
# Nutanix SOC Sandbox - Grafana Datasource Provisioning
# ---------------------------------------------------------------------------
# Datasource ini menunjuk ke OpenSearch sandbox (single node) yang menyimpan
# index nutanix_network_*. Kredensial di bawah HANYA untuk sandbox lokal.
# ---------------------------------------------------------------------------

datasources:
  - name: NUTANIX
    type: grafana-opensearch-datasource
    access: proxy
    url: https://opensearch:9200
    basicAuth: true
    basicAuthUser: admin
    jsonData:
      flavor: opensearch
      version: 2.19.4
      timeField: timestamp
      database: "nutanix_network_*"
      pplEnabled: true
      tlsSkipVerify: true
      maxConcurrentShardRequests: 5
    secureJsonData:
      basicAuthPassword: "SandboxAdmin123!"   # sandbox only - ganti di produksi
    editable: true
