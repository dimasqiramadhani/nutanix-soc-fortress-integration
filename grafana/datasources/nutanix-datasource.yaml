apiVersion: 1

# ---------------------------------------------------------------------------
# Nutanix SOC Sandbox: Grafana Datasource Provisioning
# ---------------------------------------------------------------------------
# This datasource points to the sandbox OpenSearch (single node) that stores
# the nutanix_network_* index. The credentials below are for local sandbox use only.
# ---------------------------------------------------------------------------

datasources:
  - name: NUTANIX
    uid: NUTANIX
    type: grafana-opensearch-datasource
    access: proxy
    url: https://opensearch:9200
    basicAuth: true
    basicAuthUser: admin
    jsonData:
      flavor: opensearch
      version: 2.19.4
      timeField: timestamp
      database: "nutanix_network_*"
      pplEnabled: true
      tlsSkipVerify: true
      maxConcurrentShardRequests: 5
    secureJsonData:
      basicAuthPassword: "SandboxAdmin123!"   # sandbox only, change in production
    editable: true
